app-id: tv.kodi.Kodi
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.openjdk17
command: kodi
rename-icon: kodi
rename-desktop-file: kodi.desktop
desktop-file-name-suffix: ' (Beta)'

finish-args:
  - --device=all
  - --allow=bluetooth
  - --filesystem=xdg-music
  - --filesystem=xdg-pictures
  - --filesystem=xdg-videos
  - --filesystem=xdg-run/pipewire-0:ro
  - --filesystem=/mnt
  - --filesystem=/media
  - --filesystem=/run/media
  - --filesystem=/run/lirc
  - --filesystem=/run/udev:ro
  - --share=ipc
  - --share=network
  - --socket=pulseaudio
  - --socket=fallback-x11
  - --socket=wayland
  - --system-talk-name=org.freedesktop.Avahi
  - --system-talk-name=org.freedesktop.login1
  - --system-talk-name=org.freedesktop.UDisks2
  - --system-talk-name=org.freedesktop.UPower
  - --talk-name=org.freedesktop.ScreenSaver

cleanup:
  - '*.a'
  - '*.pyc'
  - '*.pyo'
  - '*.cmake'
  - /.ref
  - /etc
  - /include
  - /lib/cmake
  - /lib64/cmake
  - /lib/pkgconfig
  - /lib64/pkgconfig
  - /man
  - /private
  - /share/doc
  - /share/man
  - /var
modules:
  - name: dav1d
    buildsystem: meson
    config-opts:
      - -Denable_asm=true
      - -Denable_tools=false
      - -Denable_examples=false
      - -Denable_tests=false
    cleanup:
      - /include
      - /bin
      - /share/doc
    sources:
      - type: archive
        url: https://code.videolan.org/videolan/dav1d/-/archive/1.5.3/dav1d-1.5.3.tar.bz2
        sha512: 208c3dee1037b4487c1846b5b5d78d8a88ee58624e4702583f4475518788cbdbefdf48e8fbcb8a2dbbad5d3a5f51a92c85baf978cf9be0aa451c5c86602f200a
        x-checker-data:
          type: anitya
          project-id: 18920
          url-template: https://code.videolan.org/videolan/dav1d/-/archive/$version/dav1d-$version.tar.bz2
  - name: ffmpeg
    config-opts:
      - --enable-libdav1d
      - --enable-gpl
      - --enable-gnutls
      - --enable-vaapi
      - --enable-vdpau
    cleanup:
      - /include
      - /lib
      - /bin
      - /share/doc
    sources:
      - type: archive
        url: https://ffmpeg.org/releases/ffmpeg-8.1.tar.xz
        sha512: 9deb30b93c27873564ec094693e72ff552f63a09af3175f9118672b88299a4e9495502aa0fb2dfbcd45857ba255f24b829bdd3c3c17d0f1eee75423302a9af8c
        x-checker-data:
          type: anitya
          project-id: 5405
          url-template: https://github.com/FFmpeg/FFmpeg/archive/refs/tags/n$version.tar.gz
  - name: flatbuffers
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DFLATBUFFERS_BUILD_FLATLIB=OFF
      - -DFLATBUFFERS_BUILD_SHAREDLIB=ON
      - -DCMAKE_INSTALL_LIBDIR=lib
    cleanup:
      - /include
      - /lib/*.so
    sources:
      - type: archive
        url: https://github.com/google/flatbuffers/archive/refs/tags/v25.12.19.tar.gz
        sha512: 808c77536fbfb1c8a1145506873a2b4e5cb508e48bf35f8502a2d1349b64e7581bfe7ff2f587b3edb2642cc885c60c0170a8875fad245240a1288057f4c07a42
        x-checker-data:
          type: anitya
          project-id: 16642
          url-template: https://github.com/google/flatbuffers/archive/refs/tags/v$version.tar.gz
      - type: shell
        commands:
          - sed -i 's/-Werror=/-W/g;s/-Werror//g' CMakeLists.txt
  - name: fstrcmp
    buildsystem: autotools
    make-args:
      - all-bin
    install-rule: install-libdir
    make-install-args:
      - install-include
    cleanup:
      - /include
      - '*.a'
    sources:
      - type: archive
        url: http://fstrcmp.sourceforge.net/fstrcmp-0.7.D001.tar.gz
        sha512: aaeb0227afd5ada5955cbe6a565254ff88d2028d677d199c00e03b7cb5de1f2c69b18e6e8b032e452350a8eda7081807b01765adbeb8476eaf803d9de6e5509c
        x-checker-data:
          type: anitya
          project-id: 7320
          url-template: http://fstrcmp.sourceforge.net/fstrcmp-$version.tar.gz
  - shared-modules/glu/glu-9.json
  - name: glm
    buildsystem: cmake-ninja
    config-opts:
      - -DBUILD_STATIC_LIBS=ON
      - -DGLM_TEST_ENABLE_CXX_11=ON
      - -DGLM_TEST_ENABLE=OFF
    sources:
      - type: archive
        url: https://github.com/g-truc/glm/archive/refs/tags/1.0.3.tar.gz
        sha256: 6775e47231a446fd086d660ecc18bcd076531cfedd912fbd66e576b118607001
        x-checker-data:
          type: anitya
          project-id: 1181
          url-template: https://github.com/g-truc/glm/archive/refs/tags/$version.tar.gz
      - type: shell
        commands:
          - echo 'install(FILES ${ROOT_HEADER} ${ROOT_INLINE} DESTINATION include/glm)'
            >> glm/CMakeLists.txt
          - echo 'install(FILES ${CORE_HEADER} ${CORE_INLINE} DESTINATION include/glm/detail)'
            >> glm/CMakeLists.txt
          - echo 'install(FILES ${EXT_HEADER} ${EXT_INLINE} DESTINATION include/glm/ext)'
            >> glm/CMakeLists.txt
          - echo 'install(FILES ${GTC_HEADER} ${GTC_INLINE} DESTINATION include/glm/gtc)'
            >> glm/CMakeLists.txt
          - echo 'install(FILES ${GTX_HEADER} ${GTX_INLINE} DESTINATION include/glm/gtx)'
            >> glm/CMakeLists.txt
          - echo 'install(FILES ${SIMD_HEADER} ${SIMD_INLINE} DESTINATION include/glm/simd)'
            >> glm/CMakeLists.txt
          - echo 'install(TARGETS glm)' >> glm/CMakeLists.txt
  - name: hwdata
    config-opts:
      - --datarootdir=${FLATPAK_DEST}/lib/
    sources:
      - type: archive
        url: https://github.com/vcrhonek/hwdata/archive/refs/tags/v0.405.tar.gz
        sha256: 13605519e72e46aa13d5eede1901a07a6c83cd25ef866a86e7458047b5c81ce5
        x-checker-data:
          type: anitya
          project-id: 13577
          stable-only: true
          url-template: https://github.com/vcrhonek/hwdata/archive/refs/tags/v$version.tar.gz
    cleanup:
      - /lib/pkgconfig
  - name: json
    buildsystem: cmake-ninja
    config-opts:
      - -DJSON_BuildTests=OFF
    sources:
      - type: archive
        url: https://github.com/nlohmann/json/archive/refs/tags/v3.12.0.tar.gz
        sha256: 4b92eb0c06d10683f7447ce9406cb97cd4b453be18d7279320f7b2f025c10187
        x-checker-data:
          type: anitya
          project-id: 11152
          url-template: https://github.com/nlohmann/json/archive/refs/tags/v$version.tar.gz
  - name: jsoncpp
    buildsystem: meson
    config-opts:
      - -Dbuildtype=release
      - -Dtests=false
    sources:
      - type: archive
        url: https://github.com/open-source-parsers/jsoncpp/archive/1.9.6.tar.gz
        sha256: f93b6dd7ce796b13d02c108bc9f79812245a82e577581c4c9aabe57075c90ea2
        x-checker-data:
          type: anitya
          project-id: 7483
          url-template: https://github.com/open-source-parsers/jsoncpp/archive/$version.tar.gz
    cleanup:
      - '/lib/*.a'
      - '/include'
  - name: libass
    cleanup:
      - /include
      - '*.a'
      - '*.la'
      - /lib/*.so
    sources:
      - type: archive
        url: https://github.com/libass/libass/archive/refs/tags/0.17.4.tar.gz
        sha512: 08762623dd09e3034699ba9d11b70d1f6cc6b2e3b38aa897b07efef1364e76141df484e70ed27888cf3595b77d072cdb5e8abbbfa560e33ca21f87872e24df8d
        x-checker-data:
          type: anitya
          project-id: 1560
          url-template: https://github.com/libass/libass/archive/refs/tags/$version.tar.gz
  - name: libgcrypt
    config-opts:
      - --disable-static
      - --disable-doc
    sources:
      - type: archive
        url: https://www.gnupg.org/ftp/gcrypt/libgcrypt/libgcrypt-1.12.1.tar.bz2
        sha512: e4be1f9d32bb672663499a1203454b9c646b7f237d9acb64303b991798fe3f4c3366793b0564b94c6687885353f6e7fef6ae6e74a57ccb5eb5606e77c81b3738
        x-checker-data:
         type: anitya
         project-id: 1623
         stable-only: true
         tag-template: libgcrypt-$version
  - name: libaacs
    rm-configure: true
    config-opts:
      - --with-pic
      - --enable-shared
      - --disable-static
    sources:
      - type: archive
        url: https://download.videolan.org/videolan/libaacs/0.11.1/libaacs-0.11.1.tar.bz2
        sha256: a88aa0ebe4c98a77f7aeffd92ab3ef64ac548c6b822e8248a8b926725bea0a39
        x-checker-data:
          type: anitya
          project-id: 5562
          url-template: https://download.videolan.org/videolan/libaacs/$version/libaacs-$version.tar.bz2
      - type: script
        dest-filename: autogen.sh
        commands:
          - rm -fv m4/libgcrypt.m4
          - autoreconf -vfi
  - name: libbdplus
    rm-configure: true
    config-opts:
      - --with-pic
      - --enable-shared
      - --disable-static
    build-options:
      append-path: /app/share/vlc/extra/bluray/ant/bin
    sources:
      - type: archive
        url: https://download.videolan.org/videolan/libbdplus/0.2.0/libbdplus-0.2.0.tar.bz2
        sha256: b93eea3eaef33d6e9155d2c34b068c505493aa5a4936e63274f4342ab0f40a58
        x-checker-data:
          type: anitya
          project-id: 5563
          url-template: https://download.videolan.org/videolan/libbdplus/$version/libbdplus-$version.tar.bz2
      - type: patch
        path: patches/libbdplus-gpg-error.patch
      - type: patch
        path: patches/libbdplus-fix-libgcrypt.patch
  - name: libbluray
    buildsystem: meson
    config-opts:
      - -Ddefault_library=shared
      - -Denable_docs=false
      - -Denable_tools=false
      - -Denable_devtools=false
      - -Denable_examples=false
      - -Dbdj_jar=disabled
      - -Djava9=false
    sources:
      - type: archive
        url: https://download.videolan.org/pub/videolan/libbluray/1.4.0/libbluray-1.4.0.tar.xz
        sha512: 7284169b32624e5ca4fd71b260a4cc2921efafb1f63143a562568be45e373bfcbfeac63895d5659ccdcb11d7dbd0236cc46ccb15c12eff855703010e46991f27
        x-checker-data:
          type: anitya
          project-id: 1565
          url-template: https://download.videolan.org/pub/videolan/libbluray/$version/libbluray-$version.tar.bz2
  - name: libcdio
    config-opts:
      - --enable-cxx
      - --without-cd-drive
      - --without-cd-info
      - --without-cdda-player
      - --without-cd-read
      - --without-iso-info
      - --without-iso-read
      - --disable-example-progs
    cleanup:
      - /include
      - /share/info
      - '*.a'
      - '*.la'
      - /lib/*.so
    sources:
      - type: archive
        url: https://github.com/libcdio/libcdio/releases/download/2.3.0/libcdio-2.3.0.tar.bz2
        sha256: 53e83d284667535a767fd2d31edad1a6701591960459df373a10f1f21e80a7ed
        x-checker-data:
          type: anitya
          project-id: 1573
          url-template: https://github.com/libcdio/libcdio/releases/download/$version/libcdio-$version.tar.bz2
  - name: libcec
    buildsystem: cmake-ninja
    cleanup:
      - /include
      - /lib/*.so
    sources:
      - type: archive
        url: https://github.com/Pulse-Eight/libcec/archive/libcec-7.1.1.tar.gz
        sha256: 7f7da95a4c1e7160d42ca37a3ac80cf6f389b317e14816949e0fa5e2edf4cc64
        x-checker-data:
          type: anitya
          project-id: 21468
          url-template: https://github.com/Pulse-Eight/libcec/archive/$version.tar.gz
    modules:
      - name: p8-platform
        buildsystem: cmake-ninja
        cleanup:
          - /include
          - '*.a'
        sources:
          - type: git
            url: https://github.com/xbmc/platform.git
            tag: p8-platform-20260129
            commit: c51ddf4787d083b6cf039761a48fb90d0c4f00ff
  - name: libdisplay-info
    buildsystem: meson
    sources:
      - type: archive
        url: https://gitlab.freedesktop.org/emersion/libdisplay-info/-/archive/0.3.0/libdisplay-info-0.3.0.tar.gz
        sha512: fa023df810d9354135c3a8576233b1a4bab29d943e9ec61ba30cfe512001e4aa56ffc10e1af42ec4d1caa5c10d8e34e3bdbe51d1858d3db580b03a3fa266ee66
        x-checker-data:
          type: anitya
          project-id: 326668
          url-template: https://gitlab.freedesktop.org/emersion/libdisplay-info/-/archive/$version/libdisplay-info-$version.tar.gz
  - name: libinput
    buildsystem: meson
    config-opts:
      - -Dlibwacom=false
      - -Ddebug-gui=false
      - -Dtests=false
      - -Ddocumentation=false
    sources:
      - type: archive
        url: https://gitlab.freedesktop.org/libinput/libinput/-/archive/1.31.0/libinput-1.31.0.tar.bz2
        sha256: af04645cef8ec4ef9b571664828086ea5a610c6f3e872880055c7fe2c9377de5
        x-checker-data:
          type: anitya
          project-id: 5781
          url-template: https://gitlab.freedesktop.org/libinput/libinput/-/archive/$version/libinput-$version.tar.bz2
    modules:
      - name: mtdev
        sources:
          - type: archive
            url: https://bitmath.se/org/code/mtdev/mtdev-1.1.7.tar.gz
            sha256: a55bd02a9af4dd266c0042ec608744fff3a017577614c057da09f1f4566ea32c
            x-checker-data:
              type: anitya
              project-id: 8868
              url-template: https://bitmath.se/org/code/mtdev/mtdev-$version.tar.gz
          - type: shell
            commands:
              - cp -p /usr/share/automake-*/config.{sub,guess} config-aux
      - name: libevdev
        buildsystem: meson
        config-opts:
          - -Dtests=disabled
          - -Ddocumentation=disabled
        sources:
          - type: archive
            url: https://www.freedesktop.org/software/libevdev/libevdev-1.13.6.tar.xz
            sha256: 73f215eccbd8233f414737ac06bca2687e67c44b97d2d7576091aa9718551110
            x-checker-data:
              type: anitya
              project-id: 20540
              url-template: https://www.freedesktop.org/software/libevdev/libevdev-$version.tar.xz
  - name: libmicrohttpd
    cleanup:
      - /include
      - '*.a'
      - '*.la'
      - /lib/*.so
    sources:
      - type: archive
        url: https://ftp.gnu.org/gnu/libmicrohttpd/libmicrohttpd-1.0.2.tar.gz
        sha512: 7092f307a00ba04b539be79a7c94ddf9b4b6e43343a66da49c6602fa860f77cf7f9017d7e40f9b7400d85a828a503248eb12dd121413aad68133003a20bb2c4a
        x-checker-data:
          type: anitya
          project-id: 1658
          url-template: https://ftp.gnu.org/gnu/libmicrohttpd/libmicrohttpd-$version.tar.gz
  - name: libnfs
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
    cleanup:
      - /include
      - /bin
      - /lib/*.so
    sources:
      - type: archive
        url: https://github.com/sahlberg/libnfs/archive/libnfs-6.0.2.tar.gz
        sha512: 539790ab98aac7b2f25755b745d1f5e016518f1adb3748b8c58df187048bc31e091915d59e6359bb95c49dd986361cbbf2536edcda02598b0fac236762b61a46
        x-checker-data:
          type: anitya
          project-id: 7325
          url-template: https://github.com/sahlberg/libnfs/archive/libnfs-$version.tar.gz
  - name: libplist
    cleanup:
      - /include
      - /bin
      - '*.a'
      - '*.la'
      - /lib/*.so
      - /share/runtime/locale
    config-opts: []
    sources:
      - type: archive
        url: https://github.com/libimobiledevice/libplist/releases/download/2.7.0/libplist-2.7.0.tar.bz2
        sha512: 83d0398b75ea9e610e49b4b96a7675b854c7551d4faf3e82e74c5c45cf04bbd95478cc40688f0995742e6a50601744d2a36641d0673aa7cc413f5ce2ec42f2d4
        x-checker-data:
          type: anitya
          project-id: 11675
          url-template: https://github.com/libimobiledevice/libplist/releases/download/$version/libplist-$version.tar.bz2
  - name: libudfread
    buildsystem: meson
    cleanup:
      - /include
      - /share/doc
      - '*.a'
      - '*.la'
      - /lib/*.so
    sources:
      - type: archive
        url: http://mirrors.kodi.tv/build-deps/sources/libudfread-1.2.0.tar.bz2
        sha512: 53df39c207cadd742b4d4f78fd14159a6e4f45c97c9a7b97a39778fab4fdb5b0c087ebba04d27c28b8078681b82c3e903a4394f0d381cdadf23d2fd24956261f
        x-checker-data:
          type: anitya
          project-id: 89591
          url-template: http://mirrors.kodi.tv/build-deps/sources/libudfread-$version.tar.gz
  - name: mariadb-connector
    buildsystem: cmake-ninja
    config-opts:
      - -DWITH_UNIT_TESTS=OFF
      - -DDEFAULT_SSL_VERIFY_SERVER_CERT=OFF
      - -DINSTALL_LIBDIR=/app/lib
    cleanup:
      - /include
      - '*.a'
    sources:
      - type: archive
        url: https://github.com/mariadb-corporation/mariadb-connector-c/archive/refs/tags/v3.4.8.tar.gz
        sha512: 7283ade71a80fb577558e36405621c51caf268ea96b501c9d98c1bb40c474e037a66fccca61a274b358ee2dbb5133e2458cb12dda3a349a3390ef40eb9f3c4b1
        x-checker-data:
          type: anitya
          project-id: 16939
          url-template: https://github.com/mariadb-corporation/mariadb-connector-c/archive/refs/tags/v$version.tar.gz
  - name: pycryptodome
    buildsystem: simple
    build-commands:
      - touch .separate_namespace
      - python3 setup.py install --prefix=/app --root=/
    sources:
      - type: archive
        url: https://files.pythonhosted.org/packages/8e/a6/8452177684d5e906854776276ddd34eca30d1b1e15aa1ee9cefc289a33f5/pycryptodome-3.23.0.tar.gz
        sha512: 86c8db4f16d788190de6a24debaaaf78958b08179a2f56c021973e3d01828e655e7deb0c65a25aa93b2ac5420ba5a0945a30f5fa8f4455c6518c89347c301c84
  - name: python3-pybind11
    buildsystem: simple
    build-commands:
      - >-
        pip3 install --exists-action=i --no-index --find-links="file://${PWD}"
        --prefix=${FLATPAK_DEST} "pybind11" --no-build-isolation
    sources:
      - type: file
        url: https://files.pythonhosted.org/packages/88/c5/e98d9c51f3d5300d5e40ad9037dd6b3b60736fd02ab68dcc98c96be7592d/pybind11-3.0.2-py3-none-any.whl
        sha256: f8a6500548919cc33bcd220d5f984688326f574fa97f1107f2f4fdb4c6fb019f
  - name: python-pillow
    buildsystem: simple
    build-commands:
      - python3 setup.py install --prefix=/app --root=/
    sources:
      - type: git
        url: https://github.com/python-pillow/Pillow.git
        tag: 12.1.1
        commit: 5158d98c807e719c5938aa3886913ef0ea6814e9
        x-checker-data:
          type: git
          tag-pattern: ^([\d.]+)$
  - name: lirc
    rm-configure: true
    config-opts:
      - --with-systemdsystemunitdir=/app/lib/systemd
    cleanup:
      - /bin
      - /sbin
      - /share
    sources:
      - type: archive
        url: https://downloads.sourceforge.net/project/lirc/LIRC/0.10.2/lirc-0.10.2.tar.bz2
        sha256: 3d44ec8274881cf262f160805641f0827ffcc20ade0d85e7e6f3b90e0d3d222a
        x-checker-data:
          type: anitya
          project-id: 10762
          url-template: https://downloads.sourceforge.net/project/lirc/LIRC/$version/lirc-$version.tar.bz2
      - type: shell
        commands:
          - sed -i s/Ubuntu/ignoreme/g configure.ac
      - type: patch
        path: patches/lirc-dont-build-docs.patch
      - type: script
        dest-filename: autogen.sh
        commands:
          - autoreconf -vfi
  - name: samba
    buildsystem: autotools
    config-opts:
      - --prefix=/app
      - --libdir=/app/lib
      - --disable-rpath
      - --disable-python
      - --without-ads
      - --without-ldap
      - --without-pam
      - --without-acl-support
      - --without-systemd
      - --without-ad-dc
      - --without-json
      - --disable-cups
      - --disable-iprint
      - --without-ldb-lmdb
    cleanup:
      - /bin
      - /sbin
      - /libexec
      - /share
      - /include
      - /lib/*.so
      - /lib/perl5
    build-options:
      env:
        PERL5LIB: /app/lib/perl5
    sources:
      - type: archive
        url: https://download.samba.org/pub/samba/stable/samba-4.24.0.tar.gz
        sha256: 1b1e457fd651a612cd08226cc6efd04e5d01e36d918c8b4c4e470e74e86881ea
        x-checker-data:
          type: anitya
          project-id: 4758
          url-template: https://download.samba.org/pub/samba/stable/samba-$version.tar.gz
    modules:
