        url: http://mirrors.kodi.tv/build-deps/sources/libudfread-1.2.0.tar.bz2
        sha512: 53df39c207cadd742b4d4f78fd14159a6e4f45c97c9a7b97a39778fab4fdb5b0c087ebba04d27c28b8078681b82c3e903a4394f0d381cdadf23d2fd24956261f
        x-checker-data:
          type: anitya
          project-id: 89591
          url-template: http://mirrors.kodi.tv/build-deps/sources/libudfread-$version.tar.gz
  - name: mariadb-connector
    buildsystem: cmake-ninja
    config-opts:
      - -DWITH_UNIT_TESTS=OFF
      - -DDEFAULT_SSL_VERIFY_SERVER_CERT=OFF
      - -DINSTALL_LIBDIR=/app/lib
    cleanup:
      - /include
      - '*.a'
    sources:
      - type: archive
        url: https://github.com/mariadb-corporation/mariadb-connector-c/archive/refs/tags/v3.4.8.tar.gz
        sha512: 7283ade71a80fb577558e36405621c51caf268ea96b501c9d98c1bb40c474e037a66fccca61a274b358ee2dbb5133e2458cb12dda3a349a3390ef40eb9f3c4b1
        x-checker-data:
          type: anitya
          project-id: 16939
          url-template: https://github.com/mariadb-corporation/mariadb-connector-c/archive/refs/tags/v$version.tar.gz
  - name: pycryptodome
    buildsystem: simple
    build-commands:
      - touch .separate_namespace
      - python3 setup.py install --prefix=/app --root=/
    sources:
      - type: archive
        url: https://files.pythonhosted.org/packages/8e/a6/8452177684d5e906854776276ddd34eca30d1b1e15aa1ee9cefc289a33f5/pycryptodome-3.23.0.tar.gz
        sha512: 86c8db4f16d788190de6a24debaaaf78958b08179a2f56c021973e3d01828e655e7deb0c65a25aa93b2ac5420ba5a0945a30f5fa8f4455c6518c89347c301c84
  - name: python3-pybind11
    buildsystem: simple
    build-commands:
      - >-
        pip3 install --exists-action=i --no-index --find-links="file://${PWD}"
        --prefix=${FLATPAK_DEST} "pybind11" --no-build-isolation
    sources:
      - type: file
        url: https://files.pythonhosted.org/packages/b3/06/c3a23c9a0263b136c519f033a58d4641e73065fefc7754e9667ec206d992/pybind11-3.0.4-py3-none-any.whl
        sha256: 961720ee652da51d531b7b2451a6bd2bc042b0106e6d9baa48ecb7d58034ce63
  - name: python-pillow
    buildsystem: simple
    build-commands:
      - python3 setup.py install --prefix=/app --root=/
    sources:
      - type: git
        url: https://github.com/python-pillow/Pillow.git
        tag: 12.2.0
        commit: 3c41c095064200a02672d89cc5ff629eaf4b0d4f
        x-checker-data:
          type: git
          tag-pattern: ^([\d.]+)$
  - name: lirc
    rm-configure: true
    config-opts:
      - --with-systemdsystemunitdir=/app/lib/systemd
    cleanup:
      - /bin
      - /sbin
      - /share
    sources:
      - type: archive
        url: https://downloads.sourceforge.net/project/lirc/LIRC/0.10.2/lirc-0.10.2.tar.bz2
        sha256: 3d44ec8274881cf262f160805641f0827ffcc20ade0d85e7e6f3b90e0d3d222a
        x-checker-data:
          type: anitya
          project-id: 10762
          url-template: https://downloads.sourceforge.net/project/lirc/LIRC/$version/lirc-$version.tar.bz2
      - type: shell
        commands:
          - sed -i s/Ubuntu/ignoreme/g configure.ac
      - type: patch
        path: patches/lirc-dont-build-docs.patch
      - type: script
        dest-filename: autogen.sh
        commands:
          - autoreconf -vfi
  - name: samba
    buildsystem: autotools
    config-opts:
      - --prefix=/app
      - --libdir=/app/lib
      - --disable-rpath
      - --disable-python
      - --without-ads
      - --without-ldap
      - --without-pam
      - --without-acl-support
      - --without-systemd
      - --without-ad-dc
      - --without-json
      - --disable-cups
      - --disable-iprint
      - --without-ldb-lmdb
    cleanup:
      - /bin
      - /sbin
      - /libexec
      - /share
      - /include
      - /lib/*.so
      - /lib/perl5
    build-options:
      env:
        PERL5LIB: /app/lib/perl5
    sources:
      - type: archive
        url: https://download.samba.org/pub/samba/stable/samba-4.24.1.tar.gz
        sha256: 217151ca318a5576f8e0de72ba0acdf08157ecf12adac42d1af86db0b09a5f5a
        x-checker-data:
          type: anitya
          project-id: 4758
          url-template: https://download.samba.org/pub/samba/stable/samba-$version.tar.gz
    modules:
      - name: parse-yapp
        buildsystem: simple
        build-commands:
          - perl Makefile.PL PREFIX=/app LIB=/app/lib/perl5
          - make
          - make install
        sources:
          - type: archive
            url: https://cpan.metacpan.org/authors/id/W/WB/WBRASWELL/Parse-Yapp-1.21.tar.gz
            sha256: 3810e998308fba2e0f4f26043035032b027ce51ce5c8a52a8b8e340ca65f13e5
  - name: shairplay
    cleanup:
      - /include
      - /bin
      - '*.a'
      - '*.la'
      - /lib/*.so
      - /share/runtime/locale
    build-options:
