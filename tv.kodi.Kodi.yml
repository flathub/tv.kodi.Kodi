app-id: tv.kodi.Kodi
runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.openjdk17
command: kodi
rename-icon: kodi
rename-desktop-file: kodi.desktop
desktop-file-name-suffix: ' (Beta)'

finish-args:
  - --device=all
  - --allow=bluetooth
  - --filesystem=xdg-music
  - --filesystem=xdg-pictures
  - --filesystem=xdg-videos
  - --filesystem=xdg-run/pipewire-0:ro
  - --filesystem=/mnt
  - --filesystem=/media
  - --filesystem=/run/media
  - --filesystem=/run/lirc
  - --filesystem=/run/udev:ro
  - --share=ipc
  - --share=network
  - --socket=pulseaudio
  - --socket=fallback-x11
  - --socket=wayland
  - --system-talk-name=org.freedesktop.Avahi
  - --system-talk-name=org.freedesktop.login1
  - --system-talk-name=org.freedesktop.UDisks2
  - --system-talk-name=org.freedesktop.UPower
  - --talk-name=org.freedesktop.ScreenSaver

cleanup:
  - '*.a'
  - '*.pyc'
  - '*.pyo'
  - '*.cmake'
  - /.ref
  - /etc
  - /include
  - /lib/cmake
  - /lib64/cmake
  - /lib/pkgconfig
  - /lib64/pkgconfig
  - /man
  - /private
  - /share/doc
  - /share/man
  - /var
modules:
  - name: dav1d
    buildsystem: meson
    config-opts:
      - -Denable_asm=true
      - -Denable_tools=false
      - -Denable_examples=false
      - -Denable_tests=false
    cleanup:
      - /include
      - /bin
      - /share/doc
    sources:
      - type: archive
        url: https://code.videolan.org/videolan/dav1d/-/archive/1.5.3/dav1d-1.5.3.tar.bz2
        sha512: 208c3dee1037b4487c1846b5b5d78d8a88ee58624e4702583f4475518788cbdbefdf48e8fbcb8a2dbbad5d3a5f51a92c85baf978cf9be0aa451c5c86602f200a
        x-checker-data:
          type: anitya
          project-id: 18920
          url-template: https://code.videolan.org/videolan/dav1d/-/archive/$version/dav1d-$version.tar.bz2
  - name: ffmpeg
    config-opts:
      - --enable-libdav1d
      - --enable-gpl
      - --enable-gnutls
      - --enable-libdrm
      - --enable-hwaccels
      - --disable-doc
    build-options:
      arch:
        x86_64:
          config-opts:
            - --enable-vaapi
        aarch64:
          config-opts:
            - --enable-v4l2_m2m
    cleanup:
      - /include
      - /lib
      - /bin
      - /share/doc
    sources:
      - type: archive
        url: https://ffmpeg.org/releases/ffmpeg-8.1.tar.xz
        sha512: 9deb30b93c27873564ec094693e72ff552f63a09af3175f9118672b88299a4e9495502aa0fb2dfbcd45857ba255f24b829bdd3c3c17d0f1eee75423302a9af8c
        x-checker-data:
          type: anitya
          project-id: 5405
          url-template: https://github.com/FFmpeg/FFmpeg/archive/refs/tags/n$version.tar.gz
      - type: file
        url: https://raw.githubusercontent.com/xbmc/xbmc/c4913a2c601c44b44ce24b7f8decb981adedccdf/tools/depends/target/ffmpeg/001-ffmpeg-all-libpostproc-plugin.patch
        sha256: ef4db98503c1303c9240fc4774d338c8460979c9948391cb6f0c5b27f512508b
        dest-filename: 001-ffmpeg-all-libpostproc-plugin.patch
      - type: shell
        commands:
          - patch -p1 < 001-ffmpeg-all-libpostproc-plugin.patch
  - name: flatbuffers
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DFLATBUFFERS_BUILD_FLATLIB=OFF
      - -DFLATBUFFERS_BUILD_SHAREDLIB=ON
      - -DCMAKE_INSTALL_LIBDIR=lib
    cleanup:
      - /include
      - /lib/*.so
    sources:
      - type: archive
        url: https://github.com/google/flatbuffers/archive/refs/tags/v25.12.19-2026-02-06-03fffb2.tar.gz
        sha512: 61d71f830a249d16e5d9e3d7ffde40b123bddc3824c3431aeedc3c19eb9913ca5c6ae4d509a65824242b50b363037cd9d5b084170e4719d8b24762c13be054c4
        x-checker-data:
          type: anitya
          project-id: 16642
          url-template: https://github.com/google/flatbuffers/archive/refs/tags/v$version.tar.gz
      - type: shell
        commands:
          - sed -i 's/-Werror=/-W/g;s/-Werror//g' CMakeLists.txt
  - name: fstrcmp
    buildsystem: autotools
    make-args:
      - all-bin
    install-rule: install-libdir
    make-install-args:
      - install-include
    cleanup:
      - /include
      - '*.a'
    sources:
      - type: archive
        url: http://fstrcmp.sourceforge.net/fstrcmp-0.7.D001.tar.gz
        sha512: aaeb0227afd5ada5955cbe6a565254ff88d2028d677d199c00e03b7cb5de1f2c69b18e6e8b032e452350a8eda7081807b01765adbeb8476eaf803d9de6e5509c
        x-checker-data:
          type: anitya
          project-id: 7320
          url-template: http://fstrcmp.sourceforge.net/fstrcmp-$version.tar.gz
  - name: glm
    buildsystem: cmake-ninja
    config-opts:
      - -DBUILD_STATIC_LIBS=ON
      - -DGLM_TEST_ENABLE_CXX_11=ON
      - -DGLM_TEST_ENABLE=OFF
    sources:
      - type: archive
        url: https://github.com/g-truc/glm/archive/refs/tags/1.0.3.tar.gz
        sha256: 6775e47231a446fd086d660ecc18bcd076531cfedd912fbd66e576b118607001
        x-checker-data:
          type: anitya
          project-id: 1181
          url-template: https://github.com/g-truc/glm/archive/refs/tags/$version.tar.gz
      - type: shell
        commands:
          - echo 'install(FILES ${ROOT_HEADER} ${ROOT_INLINE} DESTINATION include/glm)'
            >> glm/CMakeLists.txt
          - echo 'install(FILES ${CORE_HEADER} ${CORE_INLINE} DESTINATION include/glm/detail)'
            >> glm/CMakeLists.txt
          - echo 'install(FILES ${EXT_HEADER} ${EXT_INLINE} DESTINATION include/glm/ext)'
            >> glm/CMakeLists.txt
          - echo 'install(FILES ${GTC_HEADER} ${GTC_INLINE} DESTINATION include/glm/gtc)'
            >> glm/CMakeLists.txt
          - echo 'install(FILES ${GTX_HEADER} ${GTX_INLINE} DESTINATION include/glm/gtx)'
            >> glm/CMakeLists.txt
          - echo 'install(FILES ${SIMD_HEADER} ${SIMD_INLINE} DESTINATION include/glm/simd)'
            >> glm/CMakeLists.txt
          - echo 'install(TARGETS glm)' >> glm/CMakeLists.txt
  - name: hwdata
    config-opts:
      - --datarootdir=${FLATPAK_DEST}/lib/
    sources:
      - type: archive
        url: https://github.com/vcrhonek/hwdata/archive/refs/tags/v0.406.tar.gz
        sha256: 1ccfd1ca723595b1fe8794f4157ec5635be1ebedb5d13769b4be75d0b75bc199
        x-checker-data:
          type: anitya
          project-id: 13577
          stable-only: true
          url-template: https://github.com/vcrhonek/hwdata/archive/refs/tags/v$version.tar.gz
    cleanup:
      - /lib/pkgconfig
  - name: json
    buildsystem: cmake-ninja
    config-opts:
      - -DJSON_BuildTests=OFF
    sources:
      - type: archive
        url: https://github.com/nlohmann/json/archive/refs/tags/v3.12.0.tar.gz
        sha256: 4b92eb0c06d10683f7447ce9406cb97cd4b453be18d7279320f7b2f025c10187
        x-checker-data:
          type: anitya
          project-id: 11152
          url-template: https://github.com/nlohmann/json/archive/refs/tags/v$version.tar.gz
  - name: libass
    cleanup:
      - /include
      - '*.a'
      - '*.la'
      - /lib/*.so
    sources:
      - type: archive
        url: https://github.com/libass/libass/archive/refs/tags/0.17.4.tar.gz
        sha512: 08762623dd09e3034699ba9d11b70d1f6cc6b2e3b38aa897b07efef1364e76141df484e70ed27888cf3595b77d072cdb5e8abbbfa560e33ca21f87872e24df8d
        x-checker-data:
          type: anitya
          project-id: 1560
          url-template: https://github.com/libass/libass/archive/refs/tags/$version.tar.gz
  - name: libaacs
    rm-configure: true
    config-opts:
      - --with-pic
      - --enable-shared
      - --disable-static
    sources:
      - type: archive
        url: https://download.videolan.org/videolan/libaacs/0.11.1/libaacs-0.11.1.tar.bz2
        sha256: a88aa0ebe4c98a77f7aeffd92ab3ef64ac548c6b822e8248a8b926725bea0a39
        x-checker-data:
          type: anitya
          project-id: 5562
          url-template: https://download.videolan.org/videolan/libaacs/$version/libaacs-$version.tar.bz2
      - type: script
        dest-filename: autogen.sh
        commands:
          - rm -fv m4/libgcrypt.m4
          - autoreconf -vfi
  - name: libbdplus
    rm-configure: true
    config-opts:
      - --with-pic
      - --enable-shared
      - --disable-static
    build-options:
      append-path: /app/share/vlc/extra/bluray/ant/bin
    sources:
      - type: archive
        url: https://download.videolan.org/videolan/libbdplus/0.2.0/libbdplus-0.2.0.tar.bz2
        sha256: b93eea3eaef33d6e9155d2c34b068c505493aa5a4936e63274f4342ab0f40a58
        x-checker-data:
          type: anitya
          project-id: 5563
          url-template: https://download.videolan.org/videolan/libbdplus/$version/libbdplus-$version.tar.bz2
      - type: patch
        path: patches/libbdplus-gpg-error.patch
      - type: patch
        path: patches/libbdplus-fix-libgcrypt.patch
  - name: libbluray
    buildsystem: meson
    config-opts:
      - -Ddefault_library=shared
      - -Denable_docs=false
      - -Denable_tools=false
      - -Denable_devtools=false
      - -Denable_examples=false
      - -Dbdj_jar=disabled
      - -Djava9=false
    sources:
      - type: archive
        url: https://download.videolan.org/pub/videolan/libbluray/1.4.0/libbluray-1.4.0.tar.xz
        sha512: 7284169b32624e5ca4fd71b260a4cc2921efafb1f63143a562568be45e373bfcbfeac63895d5659ccdcb11d7dbd0236cc46ccb15c12eff855703010e46991f27
        x-checker-data:
          type: anitya
          project-id: 1565
          url-template: https://download.videolan.org/pub/videolan/libbluray/$version/libbluray-$version.tar.bz2
  - name: libcdio
    config-opts:
      - --enable-cxx
      - --without-cd-drive
      - --without-cd-info
      - --without-cdda-player
      - --without-cd-read
      - --without-iso-info
      - --without-iso-read
      - --disable-example-progs
    cleanup:
      - /include
      - /share/info
      - '*.a'
      - '*.la'
      - /lib/*.so
    sources:
      - type: archive
        url: https://github.com/libcdio/libcdio/releases/download/2.3.0/libcdio-2.3.0.tar.bz2
        sha256: 53e83d284667535a767fd2d31edad1a6701591960459df373a10f1f21e80a7ed
        x-checker-data:
          type: anitya
          project-id: 1573
          url-template: https://github.com/libcdio/libcdio/releases/download/$version/libcdio-$version.tar.bz2
  - name: libcec
    buildsystem: cmake-ninja
    cleanup:
      - /include
      - /lib/*.so
    sources:
      - type: archive
        url: https://github.com/Pulse-Eight/libcec/archive/c7c4c82dc171c49decfbfe5d2959706d3e2ea47c.tar.gz
        sha256: 1ea208bd6218d70102fead867c6c7ef92d5d9f6f78e5010bc0ce41312d24ccfd
        x-checker-data:
          type: anitya
          project-id: 21468
          url-template: https://github.com/Pulse-Eight/libcec/archive/$version.tar.gz
    modules:
      - name: p8-platform
        buildsystem: cmake-ninja
        cleanup:
          - /include
          - '*.a'
        sources:
          - type: git
            url: https://github.com/xbmc/platform.git
            tag: p8-platform-20260129
            commit: c51ddf4787d083b6cf039761a48fb90d0c4f00ff
  - name: libdisplay-info
    buildsystem: meson
    sources:
      - type: archive
        url: https://gitlab.freedesktop.org/emersion/libdisplay-info/-/archive/0.3.0/libdisplay-info-0.3.0.tar.gz
        sha512: fa023df810d9354135c3a8576233b1a4bab29d943e9ec61ba30cfe512001e4aa56ffc10e1af42ec4d1caa5c10d8e34e3bdbe51d1858d3db580b03a3fa266ee66
        x-checker-data:
          type: anitya
          project-id: 326668
          url-template: https://gitlab.freedesktop.org/emersion/libdisplay-info/-/archive/$version/libdisplay-info-$version.tar.gz
  - name: libinput
    buildsystem: meson
    config-opts:
      - -Dlibwacom=false
      - -Ddebug-gui=false
      - -Dtests=false
      - -Ddocumentation=false
    sources:
      - type: archive
        url: https://gitlab.freedesktop.org/libinput/libinput/-/archive/1.31.1/libinput-1.31.1.tar.bz2
        sha256: e0bb6537de892ce7c63fc5be9ad373eae894b7655c92220ef00316cc33097356
        x-checker-data:
          type: anitya
          project-id: 5781
          url-template: https://gitlab.freedesktop.org/libinput/libinput/-/archive/$version/libinput-$version.tar.bz2
    modules:
      - name: mtdev
        sources:
          - type: archive
            url: https://bitmath.se/org/code/mtdev/mtdev-1.1.7.tar.gz
            sha256: a55bd02a9af4dd266c0042ec608744fff3a017577614c057da09f1f4566ea32c
            x-checker-data:
              type: anitya
              project-id: 8868
              url-template: https://bitmath.se/org/code/mtdev/mtdev-$version.tar.gz
          - type: shell
            commands:
              - cp -p /usr/share/automake-*/config.{sub,guess} config-aux
      - name: libevdev
        buildsystem: meson
        config-opts:
          - -Dtests=disabled
          - -Ddocumentation=disabled
        sources:
          - type: archive
            url: https://www.freedesktop.org/software/libevdev/libevdev-1.13.6.tar.xz
            sha256: 73f215eccbd8233f414737ac06bca2687e67c44b97d2d7576091aa9718551110
            x-checker-data:
              type: anitya
              project-id: 20540
              url-template: https://www.freedesktop.org/software/libevdev/libevdev-$version.tar.xz
  - name: libmicrohttpd
    cleanup:
      - /include
      - '*.a'
      - '*.la'
      - /lib/*.so
    sources:
      - type: archive
        url: https://ftp.gnu.org/gnu/libmicrohttpd/libmicrohttpd-1.0.5.tar.gz
        sha256: b46d00f58efa6f497b97d2e782c4ee66301d412ddd855dd3068518b3a2cd3ea2
        x-checker-data:
          type: anitya
          project-id: 1658
          url-template: https://ftp.gnu.org/gnu/libmicrohttpd/libmicrohttpd-$version.tar.gz
  - name: libnfs
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
    cleanup:
      - /include
      - /bin
      - /lib/*.so
    sources:
      - type: archive
        url: https://github.com/sahlberg/libnfs/archive/libnfs-6.0.2.tar.gz
        sha512: 539790ab98aac7b2f25755b745d1f5e016518f1adb3748b8c58df187048bc31e091915d59e6359bb95c49dd986361cbbf2536edcda02598b0fac236762b61a46
        x-checker-data:
          type: anitya
          project-id: 7325
          url-template: https://github.com/sahlberg/libnfs/archive/libnfs-$version.tar.gz
  - name: libplist
    cleanup:
      - /include
      - /bin
      - '*.a'
      - '*.la'
      - /lib/*.so
      - /share/runtime/locale
    config-opts: []
    sources:
      - type: archive
        url: https://github.com/libimobiledevice/libplist/releases/download/2.7.0/libplist-2.7.0.tar.bz2
        sha512: 83d0398b75ea9e610e49b4b96a7675b854c7551d4faf3e82e74c5c45cf04bbd95478cc40688f0995742e6a50601744d2a36641d0673aa7cc413f5ce2ec42f2d4
        x-checker-data:
          type: anitya
          project-id: 11675
          url-template: https://github.com/libimobiledevice/libplist/releases/download/$version/libplist-$version.tar.bz2
  - name: libudfread
    buildsystem: meson
    cleanup:
      - /include
      - /share/doc
      - '*.a'
      - '*.la'
      - /lib/*.so
    sources:
